<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — CompliantUK</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&display=swap');
:root{--bg:#080c14;--bg1:#0d1220;--bg2:#111827;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--blue:#3b82f6;--blue2:#60a5fa;--blue3:#1d4ed8;--emerald2:#34d399;--font:'Bricolage Grotesque',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% -10%,rgba(59,130,246,0.1),transparent);pointer-events:none}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
nav{padding:0 5%;background:rgba(8,12,20,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:relative;z-index:10}
.nav-wrap{max-width:1160px;margin:0 auto;height:60px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--blue3),var(--blue));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:white;box-shadow:0 0 20px rgba(59,130,246,0.35)}
.logo-name{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-0.4px}
.logo-name span{color:var(--blue2)}
.nav-link{color:var(--text3);text-decoration:none;font-size:14px;transition:color 0.15s}
.nav-link:hover{color:var(--text2)}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;z-index:1}
.auth-card{background:var(--bg1);border:1px solid var(--border2);border-radius:20px;width:100%;max-width:400px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,0.5),0 0 0 1px rgba(59,130,246,0.08)}
.card-top{padding:32px 32px 24px;border-bottom:1px solid var(--border)}
.card-icon{width:48px;height:48px;background:linear-gradient(135deg,rgba(59,130,246,0.2),rgba(99,102,241,0.1));border:1px solid rgba(59,130,246,0.2);border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:20px}
.card-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:5px}
.card-sub{font-size:14px;color:var(--text2)}
.card-body{padding:24px 32px 32px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.7px}
input{background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:9px;padding:12px 14px;font-size:14.5px;font-family:var(--font);color:var(--text);outline:none;transition:all 0.15s;width:100%}
input:focus{border-color:var(--blue);background:rgba(59,130,246,0.05);box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
input::placeholder{color:var(--text3)}
.field-header{display:flex;align-items:center;justify-content:space-between}
.field-header label{margin:0}
.forgot-link{font-size:12px;color:var(--blue2);text-decoration:none}
.forgot-link:hover{text-decoration:underline}
.error-box{display:none;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:10px 14px;font-size:13px;color:#fca5a5;margin-bottom:14px}
.submit-btn{width:100%;background:linear-gradient(135deg,var(--blue3),var(--blue));color:white;border:none;padding:14px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all 0.2s;box-shadow:0 4px 20px rgba(59,130,246,0.25);margin-top:4px}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(59,130,246,0.35)}
.submit-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.switch-link{text-align:center;font-size:13.5px;color:var(--text2)}
.switch-link a{color:var(--blue2);text-decoration:none;font-weight:600}
.switch-link a:hover{text-decoration:underline}
.password-wrap{position:relative}
.password-wrap input{padding-right:44px}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:4px}
footer{padding:20px 5%;text-align:center;font-size:12px;color:var(--text3);border-top:1px solid var(--border)}
footer a{color:var(--text3);text-decoration:none}
footer a:hover{color:var(--text2)}
</style>
</head>
<body>
<nav><div class="nav-wrap"><a href="index.html" class="logo"><div class="logo-mark">✓</div><span class="logo-name">Compliant<span>UK</span></span></a><a href="register.html" class="nav-link">New here? Create account →</a></div></nav>
<main>
  <div class="auth-card">
    <div class="card-top">
      <div class="card-icon">🔑</div>
      <div class="card-title">Welcome back</div>
      <div class="card-sub">Log in to your compliance dashboard</div>
    </div>
    <div class="card-body">
      <div class="error-box" id="error-box"></div>
      <div class="field">
        <label>Email address</label>
        <input type="email" id="l-email" placeholder="you@email.com" autocomplete="email" onkeydown="if(event.key==='Enter')handleLogin(document.getElementById('login-btn'))" />
      </div>
      <div class="field">
        <div class="field-header">
          <label>Password</label>
          <a href="forgot.html" class="forgot-link">Forgot password?</a>
        </div>
        <div class="password-wrap">
          <input type="password" id="l-password" placeholder="Your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')handleLogin(document.getElementById('login-btn'))" />
          <button class="pw-toggle" onclick="var i=document.getElementById('l-password');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'👁':'🙈'" type="button">👁</button>
        </div>
      </div>
      <button class="submit-btn" id="login-btn" onclick="handleLogin(this)">Log in to dashboard →</button>
      <div class="divider">or</div>
      <div class="switch-link">Don't have an account? <a href="register.html">Create one free</a></div>
    </div>
  </div>
</main>
<footer><a href="index.html">← Back to home</a> · <a href="privacy.html">Privacy</a> · <a href="terms.html">Terms</a></footer>
<script>
var SUPABASE_URL = 'YOUR_SUPABASE_URL';
var SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

function showError(msg){var el=document.getElementById('error-box');el.textContent=msg;el.style.display='block';}
function hideError(){document.getElementById('error-box').style.display='none';}
function validateEmail(e){return e.indexOf('@')>0&&e.indexOf('.')>e.indexOf('@');}

// Check if already logged in
if(localStorage.getItem('sb_access_token')||localStorage.getItem('sb_user')){window.location.href='dashboard.html';}

async function handleLogin(btn){
  hideError();
  var email=document.getElementById('l-email').value.trim();
  var password=document.getElementById('l-password').value;
  if(!email||!validateEmail(email)){showError('Please enter a valid email address.');return;}
  if(!password){showError('Please enter your password.');return;}
  btn.textContent='Logging in...';
  btn.disabled=true;
  try{
    var res=await fetch(SUPABASE_URL+'/auth/v1/token?grant_type=password',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY},
      body:JSON.stringify({email:email,password:password})
    });
    var data=await res.json();
    if(data.error){showError(data.error_description||'Invalid email or password.');btn.textContent='Log in to dashboard →';btn.disabled=false;return;}
    localStorage.setItem('sb_access_token',data.access_token);
    localStorage.setItem('sb_refresh_token',data.refresh_token);
    localStorage.setItem('sb_user',JSON.stringify(data.user));
    window.location.href='dashboard.html';
  }catch(e){
    // Demo mode
    localStorage.setItem('sb_user',JSON.stringify({email:email,user_metadata:{full_name:email.split('@')[0]}}));
    window.location.href='dashboard.html';
  }
}
</script>
</body>
</html>
